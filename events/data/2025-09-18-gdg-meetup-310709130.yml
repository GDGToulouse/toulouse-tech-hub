  <p class="mb-4"><strong><em>Des lampes à lave pour sécuriser Internet</em> par Thibault MEUNIER</strong><br>
  Depuis 2017, l'entreprise Cloudflare utilise des lampes à lave pour renforcer la sécurité de ses connexions Internet. L'idée paraît insolite : en quoi le mouvement aléatoire de bulles colorées peut-il contribuer à protéger un réseau mondial ?</p>
  <p class="mb-4">Aujourd’hui, avec la généralisation de HTTPS, la sécurité des échanges en ligne repose notamment sur la qualité des nombres aléatoires, utilisés dans les algorithmes de chiffrement. Les lampes à lave, par leur comportement imprévisible, en offrent une excellente source.</p>
  <p class="mb-4">Dans cette présentation, nous explorerons les bases de la cryptographie appliquée : entropie, chiffrement symétrique et asymétrique, fonctions de hachage, et nous verrons comment ces concepts se traduisent concrètement dans l’architecture de Cloudflare, avec ses fameuses lampes à lave.</p>
  <p class="mb-4"><strong><em>Introduction à Google Coud RUN</em> par Néhémie BARKIA</strong><br>
  Google Cloud Run est un service d'hébergement de conteneurs sans serveur (serverless). Comment déployer une application dans cet environnement ?</p>
  <p class="mb-4">Durant ce talk, nous allons parcourir plusieurs services de Google Cloud pour pouvoir déployer notre application. Nous verrons la construction et l'envoie d'une image docker sur le Container Registry. Puis le déploiement de cette image dans Google Cloud Run. Enfin, nous parlerons Sécurité et Tarification.</p>
