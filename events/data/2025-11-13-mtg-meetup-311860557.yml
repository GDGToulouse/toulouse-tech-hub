description: >
  <div class="w-full break-words transition-all duration-300 line-clamp-[15]" style="font-family:NeuSans, Inter, system-ui, sans-serif"><p class="mb-4">🎉 À l'occasion du DevFest Toulouse le jeudi 13 novembre prochain, le meetup MTG:Toulouse vous invite à découvrir les communautés tech toulousaines dans une track spéciale dédiée aux communautés en <strong>salle Occitanie</strong>.</p>
  <p class="mb-4"><strong>⚠️ Cette session n'est accessible qu'aux visiteurs munis d'un billet pour le DevFest Toulouse 2025.</strong></p>
  <p class="mb-4">💖 Une superbe initiative de la part des organisateurs du DevFest Toulouse : dédier une salle, toute la journée, pour valoriser les communautés locales et meetups de la région.</p>
  <p class="mb-4">🤖 À cette occasion Benoit revient nous voir pour une session sur l'asynchronisme, l'occasion pour ceux qui n'ont pas pu venir en mai dernier de profiter de son expérience.</p>
  <p class="mb-4">== Threads saturés, requêtes en attente : l’asynchronisme comme levier de scalabilité ==</p>
  <p class="mb-4">❓ Pourquoi certaines applications Web se mettent-elles à ralentir quand la charge monte, même si les serveurs ne semblent pas saturés ?</p>
  <p class="mb-4">⌛ Les développeurs sous-estiment souvent l’impact du modèle synchrone dans des applications Web à moyenne ou forte charge. Le résultat ? Des threads saturés, des requêtes qui s’accumulent, et inévitablement des timeouts côté utilisateur.</p>
  <p class="mb-4">⚙️ Les démos seront en .NET mais cette problématique reste valable peu importe la technologie serveur.</p>
  <p class="mb-4">== DevFest Toulouse ==</p>
  <p class="mb-4">👋 Venez découvrir l'agenda complet du DevFest, et prendre votre billet tant qu'il en reste : <a href="https://devfesttoulouse.fr/agenda-2025/" target="_blank" class="!text-viridian" rel="nofollow ugc">https://devfesttoulouse.fr/agenda-2025/</a></p>
