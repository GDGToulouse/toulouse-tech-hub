description: >
  <div class="w-full break-words transition-all duration-300 line-clamp-[15]" style="font-family: NeuSans, Inter, system-ui, sans-serif;"><p class="mb-4">Bonjour à tous,<br>
  <br>
  Nous sommes ravis de vous convier à notre Assemblée Générale annuelle, qui sera le <strong>jeudi 18 décembre de 18h à 21h</strong> à la <strong>maison des associations</strong> (3 Pl. Guy Hersant, 31400 Toulouse)<br>
  <br>
  Il s'agit de l'occasion de faire un bilan de l'année et de réfléchir à la suite pour Agile Toulouse !<br>
  <br>
  Nous vous présenterons les moments forts ainsi que le bilan financier de cette année écoulée.<br>
  <br>
  Mais surtout, ce sera l'occasion pour vous de devenir acteur de deux façons :<br>
  </p>
  <ul class="pl-5 list-disc mb-4">
  <li>Par l'élection du nouveau Bureau :<br>
  C'est l'occasion pour vous de vous présenter au bureau et d'insuffler de nouvelles idées et perspectives ou de voter pour ceux qui vous parlent.</li>
  <li>Les objectifs et projets pour l'année à venir :<br>
  Nous souhaitons <strong>continuer à développer les projets/idées</strong> de nos adhérents pour Agile Toulouse en vous proposant un accompagnement et une structure.<br>
  Cette soirée sera donc l'occasion pour vous de proposer vos idées, et ainsi de voir comment les mettre en place pour l'année 2026.</li>
  </ul>
  <p class="mb-4"><strong>Comment Participer ?</strong><br>
  </p>
  <ul class="pl-5 list-disc mb-4">
  <li><strong>Pour participer et voter</strong> à cette Assemblée Générale Ordinaire, votre adhésion à l'association doit être active pour participer à l'élection du nouveau bureau. Si ce n'est pas déjà fait, vous pouvez adhérer sur notre site web HelloAsso, c'est facile et gratuit !</li>
  <li><strong>Pour vous présenter en tant que membre du bureau</strong>, il faut que vous soyez inscrit.e depuis plus de 6 mois et que vous soyez un.e membre actif de l'association que soit en tant qu'<a href="http://organisateur.ice/" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="nofollow ugc">organisateur.ice</a> ou bien en tant que participant.e</li>
  </ul>
  <p class="mb-4">Rejoignez-nous pour cette soirée spéciale où nous célébrerons nos réalisations, discuterons de notre avenir, et renforcerons notre communauté agile. Nous avons hâte de vous retrouver !<br>
  <br>
  Inscrivez-vous dès maintenant pour réserver votre place.<br>
  Votre participation est essentielle pour façonner l'avenir de l'Association Agile Toulouse.<br>
  <br>
  À très bientôt ! 🙂<br>
  <br>
  L'équipe du Bureau 2025 d'Agile Toulouse</p></div><button class="inline-flex items-center justify-center rounded-ds2-max max-w-full relative select-none data-[disabled=false]:active:scale-98 transition-all duration-150 before:absolute before:rounded-ds2-max before:z-0 before:opacity-0 data-[disabled=false]:hover:before:opacity-100 before:transition-opacity before:duration-150 data-[disabled=true]:cursor-not-allowed data-[disabled=true]:pointer-events-none hover:no-underline text-ds2-text_button-content-fill-brand_primary-enabled hover:text-ds2-text_button-content-fill-brand_primary-hover before:bg-ds2-text_button-base-fill-shared-hover data-[disabled=true]:text-ds2-text_button-content-fill-brand_primary-disabled gap-ds2-6 ds2-m16 before:-inset-x-ds2-12 before:-inset-y-ds2-6 w-fit" type="button" data-disabled="false"><span class="relative z-10 flex min-w-0 max-w-full items-center justify-center" style="gap: inherit;"><span class="relative z-10 flex min-w-0 max-w-full items-center justify-center truncate" style="gap: inherit;"><span class="min-w-0 max-w-full truncate">Lire plus</span></span></span></button>

