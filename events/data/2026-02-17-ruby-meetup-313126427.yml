description: >
  <div class="w-full break-words transition-all duration-300 line-clamp-[15]" style="font-family: NeuSans, Inter, system-ui, sans-serif;"><p class="mb-ds2-10">Bonjour tout le monde 👋</p>
  <p class="mb-ds2-10">Comme chaque mois, <a href="http://Toulouse.rb" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="nofollow ugc">Toulouse.rb</a> se réunit pour un nouveau meetup autour du langage Ruby.</p>
  <p class="mb-ds2-10"><strong>Le mardi 17 février, nous avons donc rendez vous dans les locaux d'At Home - Campus Médéric à Toulouse à 18:30 (jusqu'à 20:30).</strong></p>
  <p class="mb-ds2-10"><strong>📍Adresse :</strong><br>
  At Home - Campus Médéric<br>
  3 Rue Alaric II, 31000 Toulouse<br>
  Métro(s) à proximité Ⓜ️ :</p>
  <ul class="pl-5 list-disc mb-4">
  <li>Compans-Caffarelli (ligne B)</li>
  <li>Canal du Midi (ligne B)</li>
  </ul>
  <p class="mb-ds2-10">📆 <strong>Planning :</strong></p>
  <ul class="pl-5 list-disc mb-4">
  <li>18:30 démarrage de l’événement, accueil</li>
  <li>18:45 présentation de <a href="http://Toulouse.rb" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="nofollow ugc">Toulouse.rb</a> &amp; nouvelles</li>
  <li>19:00 présentation(s) technique :</li>
  <li>🔪 "Agents IA : qui a tué Swagger ?" par Julien Girard</li>
  <li>19:45 apéro</li>
  </ul>
  <p class="mb-ds2-10">L'inscription au meetup est souhaitée pour faciliter les aspects logistiques.</p>
  <p class="mb-ds2-10">N'hésitez pas à diffuser l'information autour de vous et à venir à plusieurs ! 🍕🎉</p>
  <p class="mb-ds2-10">Si vous êtes une entreprise et que vous souhaitez soutenir l'organisation de ces événements vous pouvez prendre contact avec <a href="https://fr.linkedin.com/in/thomas-riboulet-1b4056121" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="ugc">Thomas Riboulet</a>, <a href="https://fr.linkedin.com/in/fabienchaynes" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="ugc">Fabien Chaynes</a> ou Jason Lagarde, les organisateurs.</p>
  <p class="mb-ds2-10">⚠️ Nous sommes aussi à la recherche de speakers pour les prochaines éditions, que ce soit pour des lightning talks ⚡ (5-10 minutes) ou des formats plus longs 💬 (une vingtaine de minute).<br>
  Débutants comme confirmés, tout le monde peut <a href="https://forms.gle/f4a7Rg3bE6zT9yRX8" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="nofollow ugc">proposer un sujet</a> !</p>
  <p class="mb-ds2-10">Pour rappel, le serveur slack est ouvert :<br>
  <a href="https://join.slack.com/t/toulouserb/shared_invite/zt-286nnvupv-vGYNIHGWvl2rfdxQc~9pGQ" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="nofollow ugc">https://join.slack.com/t/toulouserb/shared_invite/zt-286nnvupv-vGYNIHGWvl2rfdxQc~9pGQ</a><br>
  D'anciennes présentations sont disponibles sur la chaîne YouTube :<br>
  <a href="https://www.youtube.com/@toulouse-rb" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="ugc">https://www.youtube.com/@toulouse-rb</a></p></div><button class="inline-flex items-center justify-center rounded-ds2-max max-w-full relative select-none data-[disabled=false]:active:scale-98 transition-all duration-150 before:absolute before:rounded-ds2-max before:z-0 before:opacity-0 data-[disabled=false]:hover:before:opacity-100 before:transition-opacity before:duration-150 data-[disabled=true]:cursor-not-allowed data-[disabled=true]:pointer-events-none hover:no-underline text-ds2-text_button-content-fill-brand_primary-enabled hover:text-ds2-text_button-content-fill-brand_primary-hover before:bg-ds2-text_button-base-fill-shared-hover data-[disabled=true]:text-ds2-text_button-content-fill-brand_primary-disabled gap-ds2-6 ds2-m16 before:-inset-x-ds2-12 before:-inset-y-ds2-6 w-fit" type="button" data-disabled="false"><span class="relative z-10 flex min-w-0 max-w-full items-center justify-center" style="gap: inherit;"><span class="relative z-10 flex min-w-0 max-w-full items-center justify-center truncate" style="gap: inherit;"><span class="min-w-0 max-w-full truncate px-ds2-2">Lire plus</span></span></span></button>

