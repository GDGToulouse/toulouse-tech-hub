description: >
  <div class="w-full break-words transition-all duration-300 line-clamp-[15]" style="font-family: NeuSans, Inter, system-ui, sans-serif;"><p class="mb-ds2-10">Bonjour tout le monde 👋<br>
  <br>
  Comme chaque mois, <a href="http://Toulouse.rb" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="nofollow ugc">Toulouse.rb</a> se réunit pour un nouveau meetup autour du langage Ruby.<br>
  <br>
  <strong>Le mardi 20 janvier, nous avons donc rendez vous dans les locaux d'Epitech à Toulouse à 18:30 (jusqu'à 20:30).</strong><br>
  <br>
  <strong>📍Adresse :</strong><br>
  Epitech<br>
  <a href="https://maps.app.goo.gl/h69khtWjfPgMTzgY8" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="nofollow ugc">40 Bd de la Marquette, 31000 Toulouse</a><br>
  Métro(s) à proximité Ⓜ️ :<br>
  </p>
  <ul class="pl-5 list-disc mb-4">
  <li>Compans-Caffarelli (ligne B)</li>
  <li>Canal du Midi (ligne B)</li>
  </ul>
  <p class="mb-ds2-10">📆 <strong>Planning :</strong><br>
  </p>
  <ul class="pl-5 list-disc mb-4">
  <li>18:30 démarrage de l’événement, accueil</li>
  <li>18:45 présentation de <a href="http://Toulouse.rb" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="nofollow ugc">Toulouse.rb</a> &amp; nouvelles</li>
  <li>19:00 présentation(s) technique :</li>
  <li>💬 "Indexing and Search with Apache Solr" par Adnan AIDI</li>
  <li>19:45 apéro</li>
  </ul>
  <p class="mb-ds2-10">L'inscription au meetup est souhaitée pour faciliter les aspects logistiques.<br>
  <br>
  N'hésitez pas à diffuser l'information autour de vous et à venir à plusieurs ! 🍕🎉<br>
  <br>
  Si vous êtes une entreprise et que vous souhaitez soutenir l'organisation de ces événements vous pouvez prendre contact avec <a href="https://fr.linkedin.com/in/thomas-riboulet-1b4056121" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="ugc">Thomas Riboulet</a> ou <a href="https://fr.linkedin.com/in/fabienchaynes" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="ugc">Fabien Chaynes</a>, les organisateurs.<br>
  <br>
  ⚠️ Nous sommes aussi à la recherche de speakers pour les prochaines éditions, que ce soit pour des lightning talks ⚡ (5-10 minutes) ou des formats plus longs 💬 (une vingtaine de minute).<br>
  Débutants comme confirmés, tout le monde peut <a href="https://forms.gle/f4a7Rg3bE6zT9yRX8" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="nofollow ugc">proposer un sujet</a> !<br>
  <br>
