description: >
  <div class="w-full break-words transition-all duration-300 line-clamp-[15]" style="font-family: NeuSans, Inter, system-ui, sans-serif;"><p class="mb-4">Venez expérimenter le <strong>Team Coaching</strong> de manière ludique et concrète à travers le "Jeu du Village".<br>
  Cet atelier immersif met en lumière la <strong>dynamique d'équipe</strong> et les <strong>challenges de la collaboration</strong> dans un environnement simulé. En tant que coachs, Scrum Masters, managers ou simples membres d'équipe, vous serez confrontés à une situation complexe nécessitant communication, vision partagée, et adaptation rapide.<br>
  L'objectif n'est pas seulement de construire un village, mais d'observer, de décortiquer, et d'analyser les mécanismes de l'équipe pour en identifier les <strong>leviers d'amélioration</strong> et les <strong>dysfonctionnements</strong>.</p>
  <p class="mb-4">### 🎯 <strong>Ce que vous allez explorer et apprendre</strong></p>
  <ul class="pl-5 list-disc mb-4">
  <li><strong>Le Rôle du Coach d'Équipe :</strong> Mettre en pratique des techniques de <em>Team Coaching</em> pour aider l'équipe à s'auto-organiser et à résoudre ses problèmes.</li>
  <li><strong>La Communication Efficace :</strong> Tester différentes stratégies pour construire une compréhension commune et éviter les malentendus.</li>
  <li><strong>La Vision Partagée :</strong> L'importance d'une vision claire et comment l'alignement de l'équipe influence le résultat final.</li>
  <li><strong>La Prise de Décision et la Priorisation :</strong> Gérer les contraintes, les ressources limitées et les changements de dernière minute.</li>
  <li><strong>Le Débriefing Agile :</strong> Apprendre à animer un moment de rétrospective puissant pour transformer l'expérience en apprentissage concret et actions.</li>
  </ul>
  <p class="mb-4">### 👥 <strong>Pour qui ?</strong></p>
  <p class="mb-4">Cet atelier s'adresse à toute personne impliquée dans l'accompagnement d'équipes ou désireuse d'améliorer sa collaboration :</p>
  <ul class="pl-5 list-disc mb-4">
  <li>Coachs Agiles / <strong>Coachs d'Équipe</strong></li>
  <li><strong>Scrum Masters</strong> / RTE</li>
  <li><strong>Managers</strong> et Leaders</li>
  <li><strong>Chefs de Projet</strong></li>
  <li>Membres d'<strong>équipes Agiles</strong> curieux d'expérimenter !</li>
  </ul>
  <p class="mb-4">### 🛠️ <strong>Format</strong></p>
  <ul class="pl-5 list-disc mb-4">
  <li><strong>Type :</strong> Atelier pratique, participatif et ludique.</li>
  <li><strong>Outil principal :</strong> Briques LEGO® (tout le matériel sera fourni). Ou Feuilles de papier et Feutres</li>
  <li><strong>Durée estimée :</strong> 2h</li>
  <li><strong>Pré-requis :</strong> Aucune connaissance de <em>Team Coaching</em> n'est requise, juste l'envie de particper et d'apprendre !</li>
