description: >
  <div class="w-full break-words transition-all duration-300 line-clamp-[15]" style="font-family: NeuSans, Inter, system-ui, sans-serif;"><p class="mb-ds2-10">C’est le début d’année pour les data passionnés ! Et pour bien la commencer, l’équipe TDS vous propose un <strong>"Data Mojito"</strong> le <strong>jeudi 22 janvier à partir de 19h</strong> au <strong>Delirium Café Toulouse</strong> 🍻<br>
  Comme toujours, ce sera l’occasion d’échanger autour d’un verre sur vos projets, vos idées, et l’actualité Data Science dans une ambiance détendue et conviviale.<br>
  Le bureau de l’association sera là pour discuter des événements à venir (conférences, ateliers, rencontres...) et pour entendre vos suggestions ou propositions si vous souhaitez vous impliquer dans la communauté.<br>
  📍 <strong>Lieu</strong> : <a href="https://www.google.com/maps/place/Delirium+Caf%C3%A9+Toulouse/@43.607009,1.4487632,17z/data=!3m1!4b1!4m6!3m5!1s0x12aebc984df129cd:0x4fe24e2a5bd2d576!8m2!3d43.6070051!4d1.4513435!16s%2Fg%2F11h9rf36sm?entry=ttu&amp;g_ep=EgoyMDI2MDExMy4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="!text-ds2-text-fill-brand_primary-enabled hover:!text-ds2-text-fill-brand_primary-hover" rel="ugc">Delirium Café Toulouse – Google Maps</a><br>
  📅 <strong>Date</strong> : Jeudi 22 janvier<br>
  ⏰ <strong>Heure</strong> : 19h<br>
  Venez nombreux pour trinquer à la data et lancer 2026 du bon pied ! 🍹📈</p></div>

