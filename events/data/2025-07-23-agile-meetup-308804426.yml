description: >
  <p class="mb-4">Bienvenue chez <strong>MealMatch</strong>, une startup qui a tout foiré :<br>
  4 mois de dev, zéro utilisateur actif, backlog illisible, argent qui brûle, équipe au bord de la rupture.</p>
  <p class="mb-4">👉 Et maintenant, c’est VOUS qu’on appelle à la rescousse.</p>
  <p class="mb-4">Durant cet atelier immersif et rythmé, vous serez plongé·e·s dans une situation réaliste de <strong>reprise de projet en mode produi</strong>t, avec un objectif clair : <strong>formuler un MVP actionnable, structurer un Sprint 1 crédible, et défendre vos choix devant les parties prenantes.</strong></p>
  <p class="mb-4">Ce qui vous attend<br>
  En 90 minutes top chrono :</p>
  <ul class="pl-5 list-disc mb-4">
  <li>
  <p class="mb-4">Vous analyserez un backlog chaotique à nettoyer et prioriser.</p>
  </li>
  <li>
  <p class="mb-4">Vous formulerez un MVP testable en conditions réelles.</p>
  </li>
  <li>
  <p class="mb-4">Vous construirez un Sprint 1 réaliste, avec effort estimé et Definition of Done.</p>
  </li>
  <li>
  <p class="mb-4">Vous défendrez vos choix en mode pitch PO, sous pression bienveillante.</p>
  </li>
  </ul>
  <p class="mb-4"><strong>Ce que vous allez (re)découvrir</strong></p>
  <ul class="pl-5 list-disc mb-4">
  <li>
  <p class="mb-4">Ce qu’est vraiment un MVP… et ce qu’il n’est pas.</p>
  </li>
  <li>
  <p class="mb-4">Comment faire émerger la valeur produit dans le bazar d’un backlog.</p>
  </li>
  <li>
  <p class="mb-4">Comment prioriser sous contrainte (temps, équipe, contexte flou).</p>
  </li>
  <li>
  <p class="mb-4">Comment défendre une stratégie produit courte et actionnable.</p>
  </li>
  </ul>
  <p class="mb-4"><strong>Pour qui ?</strong><br>
  Product people, devs, UX, PO, PM, Scrum Masters, Agile Coaches, CTO, étudiants, personnes en reconversion. Pas besoin d’être expert·e : curiosité et esprit d’équipe suffisent</p>
  <p class="mb-4"><strong>Format</strong> : 1h30 + 30 minutes de debrief</p>
  <p class="mb-4">Atelier conçu par <strong>Rachel Dubois</strong>, et co-animé avec <strong>Montaine Marteau</strong></p>
  <p class="mb-4">Nous demanderons aux venants d'être membres de l'association Agile Toulouse.</p>
  <p class="mb-4">Pour rappel, c'est gratuit et faisable ici en 1 minute sur téléphone : (<a href="https://www.helloasso.com/associations/agile-toulouse/adhesions/adhesion-agile-toulouse-1" target="_blank" class="!text-viridian" rel="nofollow ugc">https://www.helloasso.com/associations/agile-toulouse/adhesions/adhesion-agile-toulouse-1</a>)</p>
  <p class="mb-4">Si vous êtes inscrits, mais que cela n'est plus possible pour vous de venir, merci de vous désinscrire pour informer qu'il reste de la place :)</p>
  <p class="mb-4">Bonne journée !<br>
  Agile Toulouse</p>

